<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Varied Gradient Angle -->
    <linearGradient id="teacherGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F48FB1" />
      <stop offset="50%" stop-color="#C1278C" />
      <stop offset="100%" stop-color="#0A0410" />
    </linearGradient>
    <clipPath id="circleClip2">
      <circle cx="100" cy="100" r="90" />
    </clipPath>
  </defs>

  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#EC407A" stroke-width="2" opacity="0.4" />
  <circle cx="100" cy="100" r="90" fill="url(#teacherGrad2)" />

  <g clip-path="url(#circleClip2)">
    <!-- Stylized modern silhouette background -->
    <circle cx="100" cy="190" r="60" fill="#150A1F" opacity="0.6" />
    <circle cx="100" cy="120" r="30" fill="#150A1F" opacity="0.6" />
    
    <!-- Monogram Initials (Anna Novikova placeholder) -->
    <text x="100" y="115" 
          font-family="'Unbounded', 'Space Grotesk', sans-serif" 
          font-size="44" 
          font-weight="800" 
          fill="#F7EFF4" 
          text-anchor="middle" 
          dominant-baseline="central"
          letter-spacing="2">A.N.</text>
          
    <!-- Watermark label indicating placeholder status -->
    <rect x="30" y="155" width="140" height="22" rx="4" fill="#EC407A" opacity="0.9" />
    <text x="100" y="166" 
          font-family="'Manrope', sans-serif" 
          font-size="10" 
          font-weight="700" 
          fill="#F7EFF4" 
          text-anchor="middle" 
          dominant-baseline="central"
          letter-spacing="1">TEAM MEMBER</text>
  </g>
</svg>
