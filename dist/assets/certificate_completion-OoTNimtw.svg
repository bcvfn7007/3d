<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="100%" height="100%">
  <defs>
    <!-- Elegant security pattern -->
    <pattern id="securityWaves" width="80" height="20" patternUnits="userSpaceOnUse">
      <path d="M 0 10 Q 20 0, 40 10 T 80 10" fill="none" stroke="#C1278C" stroke-width="0.5" opacity="0.08" />
    </pattern>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC407A" />
      <stop offset="50%" stop-color="#C1278C" />
      <stop offset="100%" stop-color="#150A1F" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="560" fill="#FCF8FA" rx="8" />
  <rect width="800" height="560" fill="url(#securityWaves)" rx="8" />

  <!-- Borders -->
  <rect x="20" y="20" width="760" height="520" fill="none" stroke="#C1278C" stroke-width="3" rx="6" />
  <rect x="28" y="28" width="744" height="504" fill="none" stroke="#150A1F" stroke-width="1.5" opacity="0.2" rx="4" />

  <!-- Corner decorations -->
  <path d="M 20 50 L 50 20 M 20 60 L 60 20 M 20 70 L 70 20" stroke="#C1278C" stroke-width="1.5" />
  <path d="M 780 50 L 750 20 M 780 60 L 740 20 M 780 70 L 730 20" stroke="#C1278C" stroke-width="1.5" />
  <path d="M 20 510 L 50 540 M 20 500 L 60 540 M 20 490 L 70 540" stroke="#C1278C" stroke-width="1.5" />
  <path d="M 780 510 L 750 540 M 780 500 L 740 540 M 780 490 L 730 540" stroke="#C1278C" stroke-width="1.5" />

  <!-- Header Logo -->
  <g transform="translate(360, 60)">
    <circle cx="40" cy="40" r="35" fill="url(#brandGrad)" />
    <path d="M 48 26 C 42 19, 31 22, 31 28 C 31 34, 49 34, 49 41 C 49 47, 38 50, 31 43" fill="none" stroke="#FCF8FA" stroke-width="5" stroke-linecap="round" />
    <path d="M 31 43 L 26 47 L 32 49 Z" fill="#FCF8FA" />
  </g>

  <!-- School Name -->
  <text x="400" y="170" font-family="'Unbounded', sans-serif" font-size="24" font-weight="800" fill="#150A1F" text-anchor="middle" letter-spacing="2">STANFORD SCHOOL</text>
  <text x="400" y="190" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="700" fill="#C1278C" letter-spacing="5" text-anchor="middle">BETTER FUTURE STARTS HERE</text>

  <!-- Main Certificate Title -->
  <text x="400" y="245" font-family="'Unbounded', sans-serif" font-size="28" font-weight="800" fill="#C1278C" text-anchor="middle">CERTIFICATE OF COMPLETION</text>
  <text x="400" y="270" font-family="'Manrope', sans-serif" font-size="13" font-weight="600" fill="rgba(21,10,31,0.6)" text-anchor="middle">THIS IS PROUDLY PRESENTED TO / НАСТОЯЩИЙ СЕРТИФИКАТ ВРУЧАЕТСЯ / USHBU SERTIFIKAT TOPSHIRILADI:</text>

  <!-- Name -->
  <text x="400" y="325" font-family="'Unbounded', sans-serif" font-size="32" font-weight="900" fill="#150A1F" text-anchor="middle" letter-spacing="1">MADINA SAIDOVA</text>
  <line x1="200" y1="340" x2="600" y2="340" stroke="#150A1F" stroke-width="1" opacity="0.2" />

  <!-- Course details -->
  <text x="400" y="375" font-family="'Manrope', sans-serif" font-size="14" font-weight="500" fill="rgba(21,10,31,0.7)" text-anchor="middle">
    for successfully completing the course in
  </text>
  <text x="400" y="405" font-family="'Space Grotesk', sans-serif" font-size="20" font-weight="700" fill="#150A1F" text-anchor="middle">
    GENERAL ENGLISH • LEVEL C1 (ADVANCED)
  </text>
  
  <text x="400" y="435" font-family="'Manrope', sans-serif" font-size="13" font-weight="600" fill="rgba(21,10,31,0.5)" text-anchor="middle">
    Grade: Grade A (Excellent) | Date: June 15, 2026
  </text>

  <!-- Watermark -->
  <g transform="translate(400, 310) rotate(-15)">
    <text font-family="'Unbounded', sans-serif" font-size="44" font-weight="900" fill="#EC407A" opacity="0.1" text-anchor="middle" letter-spacing="3">SAMPLE • ОБРАЗЕЦ • NAMUNA</text>
  </g>

  <!-- Signatures / Stamps -->
  <g transform="translate(150, 490)" font-family="'Manrope', sans-serif" font-size="11" fill="rgba(21,10,31,0.5)">
    <line x1="-30" y1="-10" x2="120" y2="-10" stroke="#150A1F" stroke-width="1" opacity="0.2" />
    <text text-anchor="middle" x="45">Director of Studies</text>
  </g>

  <g transform="translate(650, 490)" font-family="'Manrope', sans-serif" font-size="11" fill="rgba(21,10,31,0.5)">
    <line x1="-120" y1="-10" x2="30" y2="-10" stroke="#150A1F" stroke-width="1" opacity="0.2" />
    <text text-anchor="middle" x="-45">Academic Director</text>
  </g>
</svg>
